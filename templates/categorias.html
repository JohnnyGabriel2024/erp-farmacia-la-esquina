{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Gestión de Categorías</h2>

    <form method="POST">
        <label>Nombre de Categoría</label>
        <input type="text" name="nombre" required>
        <button type="submit">Agregar Categoría</button>
    </form>
</div>

<div class="card">
    <h3>Listado de Categorías</h3>

    <table>
        <thead>
            <tr>
                <th class="num">ID</th>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            {% for c in categorias %}
            <tr>
                <td class="num">{{ c["id"] }}</td>
                <td>{{ c["nombre"] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
